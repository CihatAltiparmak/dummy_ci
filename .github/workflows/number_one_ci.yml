name: CI

on: [push, pull_request, workflow_dispatch]

jobs:
  masquerade:
    name: mooOS ${{ matrix.ROS_DISTRO }} (${{ matrix.ROS_REPO }})
    strategy:
      matrix:
        ROS_DISTRO: [rolling]
        ROS_REPO: [testing, main]
        UPSTREAM_WORKSPACE: [moveit_middleware_benchmark.repos]
        UPSTREAM_CMAKE_ARGS: [-DCMAKE_BUILD_TYPE=Release --packages-skip test_dynmsg dynmsg_demo]
    env:
      CCACHE_DIR: "${{ github.workspace }}/.ccache"
    runs-on: ubuntu-latest
    steps:
      - uses: CihatAltiparmak/dummy_ci@v1
